<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow — Система управления обучением</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <section id="auth-screen" class="auth-section">
        <div class="auth-card">
            <div class="brand">
                <i class="fas fa-rocket"></i>
                <span>EduFlow</span>
            </div>
            
            <form id="login-form">
                <h2>С возвращением!</h2>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="name@school.ru">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
        </div>
    </section>

    <main id="main-app" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-rocket"></i>
                <span>EduFlow</span>
            </div>
            
            <nav class="menu">
                <button class="menu-item active" data-target="dash"><i class="fas fa-chart-pie"></i> Дашборд</button>
                <button class="menu-item" data-target="journal"><i class="fas fa-book-open"></i> Журнал</button>
                <button class="menu-item" data-target="users" id="nav-teacher-only"><i class="fas fa-user-graduate"></i> Студенты</button>
            </nav>

            <div class="sidebar-footer">
                <button onclick="handleLogout()" class="btn-logout">
                    <i class="fas fa-door-open"></i> Выйти
                </button>
            </div>
        </aside>

        <section class="content">
            <header class="top-bar">
                <h1 id="page-title">Дашборд</h1>
                <div class="user-profile">
                    <span id="display-name">Загрузка...</span>
                    <div class="avatar"></div>
                </div>
            </header>

            <div id="dash" class="tab-content">
                <div class="stats-container">
                    <div class="stat-card">
                        <small>Средний балл</small>
                        <h2 id="stat-avg">0.0</h2>
                    </div>
                    <div class="stat-card">
                        <small>Пропуски</small>
                        <h2 id="stat-absent">0</h2>
                    </div>
                </div>
            </div>

            <div id="journal" class="tab-content hidden">
                <div class="table-wrapper">
                    <table id="grades-table">
                        <thead>
                            <tr>
                                <th>Предмет</th>
                                <th>Оценка</th>
                                <th>Дата</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
